name: MMORPGPlugin
version: '0.1.0'
main: com.mmorpg.plugin.core.MMORPGPlugin
api-version: '1.21'
description: Custom MMORPG layer — races, classes, mana, and abilities.
authors: [ YourName ]

softdepend:
  - Kingdoms
  - Oraxen

commands:
  mana:
    description: Admin mana control
    usage: /mana <set|setmax|setregen|fill|get|help> [player] [value]
    permission: mmorpg.admin.mana
  mmorpg:
    description: Top-level admin command
    usage: /mmorpg <reload|debug> [player]
    permission: mmorpg.admin
  cast:
    description: Cast an ability (proof of concept)
    usage: /cast <demo|help>

permissions:
  mmorpg.admin:
    description: Full admin access
    default: op
  mmorpg.admin.mana:
    description: Access to /mana commands
    default: op
