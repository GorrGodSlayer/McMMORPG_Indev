# ─────────────────────────────────────────────────────
#  MMORPGPlugin · config.yml
#  /mmorpg reload applies changes live.
# ─────────────────────────────────────────────────────

# ── Mana ──────────────────────────────────────────────
mana:
  default-max: 100.0
  default-regen: 2.0
  regen-interval-ticks: 20
  action-bar-refresh-ticks: 10
  bossbar:
    filled-color: "#5599FF"
    empty-color:  "#1a2a44"
    label-color:  "#88aaff"
    value-color:  "#cce0ff"

# ── Health ────────────────────────────────────────────
health:
  default-max: 500.0
  default-regen: 1.0
  regen-interval-ticks: 80
  color:
    filled: "#ff4444"
    empty:  "#3a1111"
    label:  "#ff8888"

# ── Stamina ───────────────────────────────────────────
stamina:
  default-max: 100.0
  default-regen: 5.0
  tick-interval-ticks: 20
  sprint-drain-per-tick: 1.0
  jump-drain: 10.0
  color:
    filled: "#44cc44"
    empty:  "#113311"
    label:  "#88ee88"

# ── Armour ────────────────────────────────────────────
armour:
  default-max: 200.0
  color:
    filled: "#aaaacc"
    empty:  "#222233"
    label:  "#ccccee"

# ── Souls ─────────────────────────────────────────────
souls:
  default-value: 1
  bossbar:
    label-color: "#cc88ff"
    value-color: "#eeccff"
  values:
    ZOMBIE: 1
    SKELETON: 1
    SPIDER: 1
    CAVE_SPIDER: 2
    CREEPER: 3
    WITCH: 4
    ENDERMAN: 5
    BLAZE: 4
    GHAST: 5
    MAGMA_CUBE: 2
    PIGLIN_BRUTE: 6
    WITHER_SKELETON: 8
    SHULKER: 6
    ELDER_GUARDIAN: 20
    WITHER: 50
    ENDER_DRAGON: 200

# ── HUD shared ────────────────────────────────────────
hud:
  # Segments in each action bar stat bar (health/stamina/armour)
  stat-bar-length: 8
  # Segments in the mana BossBar fill (visual only — BossBar handles this)
  mana-bar-length: 20
  bar-filled-char: "█"
  bar-empty-char:  "░"
  separator-color: "#2a2a3a"
  # Spaces added either side of the action bar to center it
  padding-spaces: 0

# ── Integrations ──────────────────────────────────────
integrations:
  kingdoms: true
  oraxen: true

# ── Storage ───────────────────────────────────────────
storage:
  player-data-folder: playerdata
  autosave-interval: 60
